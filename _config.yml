#auto: true

# markdown的解析器
markdown: kramdown

# 代码高亮
highlighter: rouge
# 分页设置
#paginate: 8
# 链接样式
permalink: /:title/


# title: NingG.github.com
title: 郭宁的个人博客

# 网站语言设置
lang: zh-CN
locale: zh_CN

# page中head部分的meta元素
keywords: 郭宁, 技术博客, 编程, 软件工程, 架构设计, 云计算, 激情, 使命
description: 郭宁的个人博客 - 分享技术心得、架构设计与编程经验

# url: http://ningg.github.com
url: https://ningg.top
beian: 京ICP备19013747号-1
beian-url: https://beian.miit.gov.cn

feed: /atom.xml
atom_path: /atom.xml

# author_info: <a href="http://ningg.github.com/">NingG</a>
author_info: <a href="http://ningg.top/">NingG</a>

# 作者信息配置
author:
  name: NingG
  email: guoning.gn@gmail.com
  twitter: # 可填写 Twitter 账号
  github: ningg

# SEO 默认图片（用于 Open Graph 和 Twitter Cards）
default_image: /images/default-og-image.png

# Jekyll 插件
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# SEO 标签配置
jekyll-seo-tag:
  social:
    name: 郭宁
    links:
      - https://github.com/ningg

# 网站发布日期（用于结构化数据）
site_launch_date: 2014-01-01

collections:
  favorites:
    output: true
    permalink: /favorites/:title/

defaults:
  - scope:
      path: ""
      type: favorites
    values:
      layout: favorite

