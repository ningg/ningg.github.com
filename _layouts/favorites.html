---
layout: default
---

<div class="index-content favorites">
    <div class="section">
        {% include main-nav.html active='favorites' %}

        <div class="cate-bar"><span id="cateBar"></span></div>

        <ul class="artical-list">
        {% assign items = site.favorites | sort: 'date' | reverse %}
        {% for item in items %}
            {% unless item.published == false %}
            <li>
                <h2><a href="{{ item.url }}">{{ item.title }}</a></h2>
                <div class="title-desc">{{ item.description }}</div>
            </li>
            {% endunless %}
        {% endfor %}
        </ul>

        {{ content }}
    </div>
    <div class="aside">
    </div>
</div>

<script type="text/javascript">
    $(function(){
        function animateBar($item,noAni){
            var spanLeft = $item.find('span').offset().left;
            var conLeft = $item.parent().offset().left;
            var left = spanLeft - conLeft;
            var width = $item.find('span').width() + 2;

            if(noAni){
                $('#cateBar').css({left:left,width:width})
            }else{
                $('#cateBar').stop().animate({left:left,width:width},300)
            }
        }

        var waitForFinalEvent = (function () {
            var timers = {};
            return function (callback, ms, uniqueId) {
                if (!uniqueId) {
                    uniqueId = "Don't call this twice without a uniqueId";
                }
                if (timers[uniqueId]) {
                    clearTimeout (timers[uniqueId]);
                }
                timers[uniqueId] = setTimeout(callback, ms);
            };
        })();

        $('.artical-cate li').mouseenter(function(){
            animateBar($(this));
        }).mouseleave(function(){
            animateBar($('.artical-cate .on'));
        });

        $(window).resize(function(e){
            waitForFinalEvent(function(){
                animateBar($('.artical-cate .on'));
            })
        })
        animateBar($('.artical-cate .on'),true);
    });
</script>

<script src="/js/page.js" type="text/javascript"></script>
